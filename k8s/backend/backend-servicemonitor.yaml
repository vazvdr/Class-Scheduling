apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: backend-monitor
  namespace: classscheduling
  labels:
    release: monitoring

spec:
  namespaceSelector:
    matchNames:
      - classscheduling

  selector:
    matchLabels:
      app: backend

  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s